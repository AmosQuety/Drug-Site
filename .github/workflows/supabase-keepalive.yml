name: Supabase Keepalive

on:
  schedule:
    # Every 6 hours (UTC) to avoid inactivity pauses.
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY secret."
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/Drugs?select=id&limit=1")

          echo "HTTP status: $STATUS"
          cat /tmp/resp.txt

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Supabase keepalive ping failed."
            exit 1
          fi

          echo "Supabase keepalive ping succeeded."
