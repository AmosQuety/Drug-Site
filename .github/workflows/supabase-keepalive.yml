name: Supabase Keepalive

on:
  schedule:
    # Every 6 hours (UTC) to avoid inactivity pauses.
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY secret."
            exit 1
          fi

          # Remove trailing slash from URL if present
          CLEAN_URL=$(echo "$SUPABASE_URL" | sed 's/\/*$//')
          
          echo "Pinging: $CLEAN_URL"

          # Perform the ping and capture status and response body
          RESPONSE_FILE="/tmp/resp.txt"
          STATUS=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${CLEAN_URL}/rest/v1/Drugs?select=id&limit=1")

          echo "HTTP status: $STATUS"
          
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::Supabase keepalive ping failed (Status: $STATUS)."
            echo "--- Server Response ---"
            cat "$RESPONSE_FILE"
            echo -e "\n-----------------------"
            
            if [ "$STATUS" -eq 503 ]; then
              echo "::warning::Project might be PAUSED. Please resume it manually in the Supabase dashboard."
            fi
            
            exit 1
          fi

          echo "Supabase keepalive ping succeeded."
